name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # JDK 25 builds fine against our release=11 bytecode but Gradle 8.x's
        # daemon doesn't yet parse Java 25 class files. Re-add once we migrate
        # to a Gradle 9 + toolchain setup where Gradle runs on 21 and compiles
        # against the matrix JDK.
        java: ["11", "17", "21"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew check --no-daemon
